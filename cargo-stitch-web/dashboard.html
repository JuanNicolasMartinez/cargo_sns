<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cargo SNS - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d7ff2",
                        "background-light": "#f5f7f8",
                        "background-dark": "#080c11",
                        "accent-orange": "#ff8c00",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .glass-primary {
            background: rgba(13, 127, 242, 0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(13, 127, 242, 0.2);
        }
    </style>
</head>

<body
    class="bg-background-dark font-display text-slate-100 min-h-screen flex flex-col max-w-md mx-auto relative overflow-hidden">
    <!-- Top Bar -->
    <header
        class="sticky top-0 z-50 flex items-center justify-between px-6 py-6 bg-background-dark/80 backdrop-blur-md border-b border-white/5">
        <div class="flex items-center gap-3">
            <div class="relative">
                <div class="size-12 rounded-2xl overflow-hidden border border-primary/30 bg-slate-800">
                    <img id="user-avatar" alt="Profile" class="w-full h-full object-cover"
                        src="https://i.pravatar.cc/150?u=nicolas" />
                </div>
                <div
                    class="absolute -bottom-1 -right-1 size-4 bg-green-500 rounded-full border-4 border-background-dark">
                </div>
            </div>
            <div>
                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Master Admin</p>
                <h1 id="user-name" class="text-base font-extrabold text-white">Alex Rivers</h1>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button
                class="size-11 flex items-center justify-center rounded-2xl glass hover:bg-primary/20 transition-colors">
                <span class="material-symbols-outlined text-slate-300">notifications</span>
            </button>
        </div>
    </header>

    <main class="flex-1 px-6 py-6 space-y-8 overflow-y-auto pb-32">
        <!-- Branding -->
        <section>
            <div class="flex items-center justify-between mb-1">
                <h2 class="text-3xl font-black italic tracking-tighter text-white uppercase italic">CARGO<span
                        class="text-primary">SNS</span></h2>
                <span
                    class="px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider bg-primary/20 text-primary border border-primary/30">LTS
                    v1.0</span>
            </div>
            <p class="text-slate-500 text-xs font-medium uppercase tracking-widest">Global Logistics Operations</p>
        </section>

        <!-- Key Metrics -->
        <section class="grid grid-cols-2 gap-4">
            <div class="glass p-6 rounded-3xl flex flex-col justify-between aspect-square">
                <div class="size-12 rounded-2xl bg-primary/10 flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined text-primary text-3xl">inventory_2</span>
                </div>
                <div>
                    <p class="text-slate-500 text-[10px] font-black uppercase tracking-widest mb-1">Stored Goods</p>
                    <div class="flex items-baseline gap-1">
                        <span id="metric-goods" class="text-2xl font-black text-white">4,284</span>
                        <span class="text-[10px] text-slate-500 font-bold uppercase">tons</span>
                    </div>
                </div>
            </div>
            <div class="glass-primary p-6 rounded-3xl flex flex-col justify-between aspect-square">
                <div
                    class="size-12 rounded-2xl bg-primary flex items-center justify-center mb-4 shadow-xl shadow-primary/30">
                    <span class="material-symbols-outlined text-white text-3xl">route</span>
                </div>
                <div>
                    <p class="text-slate-100/50 text-[10px] font-black uppercase tracking-widest mb-1">Active Routes</p>
                    <div class="flex items-baseline gap-1">
                        <span id="metric-routes" class="text-2xl font-black text-white">12</span>
                        <span class="text-[10px] text-slate-100/50 font-bold uppercase">Live</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Recent Activity -->
        <section class="space-y-4">
            <div class="flex items-center justify-between">
                <h3 class="text-xl font-black text-white uppercase tracking-tight italic">Operations Log</h3>
                <button class="text-primary text-xs font-black uppercase">Filter</button>
            </div>

            <div id="alerts-container" class="space-y-3">
                <!-- Alerts injected by simulator.js -->
            </div>
        </section>

        <!-- Dynamic Shipments -->
        <section class="space-y-4">
            <h3 class="text-xl font-black text-white uppercase tracking-tight italic">Shipments</h3>
            <div id="shipments-container" class="space-y-3">
                <!-- Shipments injected by simulator.js -->
            </div>
        </section>
    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 left-0 right-0 z-50 bg-background-dark/90 backdrop-blur-2xl border-t border-white/5 pb-8 pt-4 px-6 max-w-md mx-auto">
        <div class="flex items-center justify-around">
            <a class="flex flex-col items-center gap-1 group" href="dashboard.html">
                <div
                    class="size-12 rounded-2xl bg-primary flex items-center justify-center text-white shadow-xl shadow-primary/40">
                    <span class="material-symbols-outlined">dashboard</span>
                </div>
                <span class="text-[10px] font-black text-primary uppercase">Home</span>
            </a>
            <a class="flex flex-col items-center gap-1 group" href="marketplace.html">
                <div
                    class="size-12 rounded-2xl flex items-center justify-center text-slate-500 group-hover:text-slate-300 transition-colors">
                    <span class="material-symbols-outlined">explore</span>
                </div>
                <span class="text-[10px] font-black text-slate-500 uppercase">Explore</span>
            </a>
            <div class="relative -mt-12">
                <button
                    class="size-16 bg-white rounded-3xl flex items-center justify-center text-background-dark shadow-2xl">
                    <span class="material-symbols-outlined text-4xl">add</span>
                </button>
            </div>
            <a class="flex flex-col items-center gap-1 group" href="#">
                <div
                    class="size-12 rounded-2xl flex items-center justify-center text-slate-500 group-hover:text-slate-300 transition-colors">
                    <span class="material-symbols-outlined">local_shipping</span>
                </div>
                <span class="text-[10px] font-black text-slate-500 uppercase">Fleet</span>
            </a>
            <a class="flex flex-col items-center gap-1 group" href="#">
                <div
                    class="size-12 rounded-2xl flex items-center justify-center text-slate-500 group-hover:text-slate-300 transition-colors">
                    <span class="material-symbols-outlined">settings</span>
                </div>
                <span class="text-[10px] font-black text-slate-500 uppercase">Tools</span>
            </a>
        </div>
    </nav>
    <script src="simulator.js"></script>
</body>

</html>
