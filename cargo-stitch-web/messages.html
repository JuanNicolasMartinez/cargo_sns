<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cargo SNS - Mensajes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d7ff2",
                        "background-dark": "#080c11",
                        "surface-dark": "#121b24"
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(18, 27, 36, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .message-in {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 1rem 1rem 1rem 0;
            margin-right: auto;
        }

        .message-out {
            background: rgba(13, 127, 242, 0.2);
            border: 1px solid rgba(13, 127, 242, 0.3);
            border-radius: 1rem 1rem 0 1rem;
            margin-left: auto;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>

<body
    class="bg-background-dark font-display flex flex-col min-h-screen text-white overflow-hidden max-w-md mx-auto relative border-x border-white/5">
    
    <!-- Top Header -->
    <header class="glass-panel p-4 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <button onclick="window.history.back()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            </button>
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img src="https://ui-avatars.com/api/?name=Bodega+Norte&background=0D8ABC&color=fff" class="w-10 h-10 rounded-full border border-white/10" alt="Avatar">
                    <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-background-dark rounded-full"></span>
                </div>
                <div>
                    <h2 class="font-bold text-sm tracking-wide">Bodega Norte (ID: 021)</h2>
                    <p class="text-[10px] text-slate-400 font-medium uppercase tracking-widest">Negociando Carga #4892</p>
                </div>
            </div>
        </div>
        <button class="p-2 hover:bg-white/10 rounded-full transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
    </header>

    <!-- Chat Messages Area -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-4 space-y-4 pb-24 flex flex-col">
        <!-- Messages will be injected here by JS -->
        <div class="text-center w-full py-2">
            <span class="text-[10px] bg-white/5 px-3 py-1 rounded-full text-slate-500 font-bold uppercase tracking-widest">
                Conectando con Supabase Realtime...
            </span>
        </div>
    </main>

    <!-- Bottom Input Area -->
    <footer class="glass-panel p-4 absolute bottom-0 w-full rounded-t-3xl min-h-[80px]">
        <form id="chat-form" class="flex items-end gap-2">
            <button type="button" class="p-3 text-slate-400 hover:text-white transition-colors bg-white/5 rounded-2xl shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
            </button>
            <textarea id="message-input" rows="1" placeholder="Escribe un mensaje..." class="w-full bg-surface-dark border border-white/10 rounded-2xl px-4 py-3 text-sm focus:ring-1 focus:ring-primary focus:border-primary resize-none placeholder-slate-600 transition-all outline-none text-white max-h-32"></textarea>
            <button type="submit" id="send-btn" class="p-3 bg-primary text-white rounded-2xl shrink-0 hover:bg-blue-600 active:scale-95 transition-all disabled:opacity-50 disabled:pointer-events-none shadow-lg shadow-primary/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></svg>
            </button>
        </form>
    </footer>

    <!-- Logic -->
    <script type="module" src="/public/chat.js"></script>
    <script>
        // Auto-expand textarea
        const tx = document.getElementById('message-input');
        tx.setAttribute('style', 'height:' + (tx.scrollHeight) + 'px;overflow-y:hidden;');
        tx.addEventListener("input", OnInput, false);

        function OnInput() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if (this.value.trim() !== '') {
                document.getElementById('send-btn').removeAttribute('disabled');
            } else {
                document.getElementById('send-btn').setAttribute('disabled', 'true');
            }
        }
    </script>
</body>

</html>
