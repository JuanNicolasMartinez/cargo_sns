<!DOCTYPE html>
<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Cargo SNS - Mobile App</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0d7ff2",
                        "background-dark": "#080c11",
                    },
                    fontFamily: { "display": ["Inter", "sans-serif"] },
                },
            },
        }
    </script>
    <style>
        @keyframes pulse-custom {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.7;
                transform: scale(0.95);
            }
        }

        .animate-pulse-custom {
            animation: pulse-custom 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>

<body
    class="bg-background-dark font-display flex flex-col items-center justify-center min-h-screen text-white overflow-hidden max-w-md mx-auto p-8">
    <div class="text-center space-y-8">
        <div class="relative">
            <div
                class="size-24 bg-primary/20 rounded-[2rem] flex items-center justify-center mx-auto blur-xl absolute inset-0">
            </div>
            <div
                class="size-24 bg-primary rounded-[2rem] flex items-center justify-center mx-auto relative border border-white/10 shadow-2xl">
                <img alt="Cargo SNS Logo" class="size-16 object-contain"
                    src="https://cdn-icons-png.flaticon.com/512/3061/3061341.png" />
            </div>
        </div>

        <div class="space-y-2">
            <h1 class="text-5xl font-black italic tracking-tighter uppercase italic">CARGO<span
                    class="text-primary text-6xl">SNS</span></h1>
            <p class="text-slate-500 font-bold uppercase tracking-[0.3em] text-[10px]">Logistics Ecosystem</p>
        </div>

        <div class="pt-12">
            <button onclick="window.location.href='onboarding.html'"
                class="w-full bg-white text-background-dark px-8 py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-2xl hover:scale-105 active:scale-95 transition-all">
                Enter Platform
            </button>
            <p class="mt-6 text-slate-500 text-[10px] font-bold uppercase tracking-widest animate-pulse-custom">
                Synthetic Data Engine Active</p>
        </div>
    </div>

    <div class="absolute bottom-8 text-center w-full left-0 opacity-30">
        <p class="text-[8px] font-bold uppercase tracking-widest text-slate-400">Enterprise Edition v1.0.42</p>
    </div>
</body>

</html>
